###############################################################################
# Alembic Configuration — OpenVox GUI Database Migrations
#
# This file configures Alembic, the database migration tool used by
# SQLAlchemy. Alembic tracks schema changes (new tables, added columns,
# renamed fields, etc.) as versioned Python scripts, each with an
# upgrade() and downgrade() function. This allows the application to
# evolve its database schema over time while preserving existing data,
# and to revert schema changes when switching between branches.
#
# The actual database URL is NOT configured here — it is read from the
# application's settings (config.py) in env.py, ensuring that the
# migration tool always uses the same database as the running app.
#
# Usage:
#   cd /opt/openvox-gui/backend
#
#   # Apply all pending migrations (run after every update):
#   /opt/openvox-gui/venv/bin/alembic upgrade head
#
#   # Revert the last migration (for branch switching):
#   /opt/openvox-gui/venv/bin/alembic downgrade -1
#
#   # Revert to a specific revision:
#   /opt/openvox-gui/venv/bin/alembic downgrade <revision_id>
#
#   # Generate a new migration after modifying models:
#   /opt/openvox-gui/venv/bin/alembic revision --autogenerate -m "description"
#
#   # Show current migration status:
#   /opt/openvox-gui/venv/bin/alembic current
#
#   # Show migration history:
#   /opt/openvox-gui/venv/bin/alembic history
###############################################################################

[alembic]

# Path to the migration scripts directory, relative to this file.
# Each migration is a Python file in this directory with upgrade()
# and downgrade() functions.
script_location = alembic

# Template used when generating new migration files with
# 'alembic revision'. The default template includes the revision
# ID, a docstring, and empty upgrade/downgrade functions.
# file_template = %%(rev)s_%%(slug)s

# Timezone for migration file timestamps. UTC is used for consistency
# across all deployments regardless of server timezone.
timezone = UTC

# Truncate long revision IDs in the migration file names to keep
# filenames manageable. The full ID is always stored inside the file.
truncate_slug_length = 40

# Set to 'true' to run each migration in its own transaction.
# Recommended for SQLite since it has limited DDL transaction support.
# revision_environment = false

# Logging configuration. Alembic uses Python's standard logging
# module. The root logger is set to WARN to suppress noise, while
# the alembic and sqlalchemy loggers are set to INFO to show
# migration progress.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
