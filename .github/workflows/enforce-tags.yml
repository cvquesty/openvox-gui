name: Enforce Tags on HEAD

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

jobs:
  verify-tag-on-head:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Verify tag points to current HEAD of main
        run: |
          echo "🔍 Verifying tag ${{ github.ref }}"

          TAG_REF="${{ github.ref }}"
          TAG_NAME="${TAG_REF#refs/tags/}"
          TAG_COMMIT=$(git rev-parse "$TAG_REF^{commit}" 2>/dev/null || git rev-parse "$TAG_REF")

          MAIN_HEAD=$(git rev-parse origin/main)

          echo "Tag name: $TAG_NAME"
          echo "Tag commit: $TAG_COMMIT"
          echo "main HEAD: $MAIN_HEAD"

          if [ "$TAG_COMMIT" != "$MAIN_HEAD" ]; then
            echo "❌ Error: Tag must point to the current HEAD of the default branch (main)."
            echo "   This prevents tags from being created on arbitrary commits or other branches."
            echo ""
            echo "To create a proper release tag:"
            echo "   1. Ensure your changes are merged to main"
            echo "   2. Checkout main"
            echo "   3. git tag -a $TAG_NAME -m \"Version $TAG_NAME\""
            echo "   4. git push origin $TAG_NAME"
            exit 1
          fi

          echo "✅ Tag is correctly placed on current HEAD of main"
