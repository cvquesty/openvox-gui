# /etc/puppetlabs/puppetserver/conf.d/openvox-pkgs-webserver.conf
#
# Adds a static-content mount to the puppetserver web stack so that
# /packages/* on port 8140 (the standard PuppetServer port) is served
# directly from /opt/openvox-pkgs/.  This is the same technique
# Puppet Enterprise uses to expose its pe_repo agent packages.
#
# Why mount this on puppetserver instead of the openvox-gui FastAPI
# app?  Two reasons:
#
#   1. Firewalls in most enterprise networks already permit traffic
#      to port 8140 (the standard Puppet agent port).  Reusing it
#      means agent installs work without additional firewall holes.
#   2. The puppetserver host is the canonical FQDN that agents already
#      know about, so install commands can be a single one-liner
#      pointing at the same hostname agents use for catalog requests.
#
# Installed by openvox-gui's install.sh into:
#   /etc/puppetlabs/puppetserver/conf.d/openvox-pkgs-webserver.conf
#
# After installing, restart puppetserver:
#   systemctl restart puppetserver
#
# This file is HOCON formatted.  The puppetserver merges every .conf
# file in conf.d/ at startup -- the keys here are merged into the
# webserver { } block defined in webserver.conf.  We declare only the
# static-content key to avoid clobbering ssl-port, ssl-cert, etc.
#
# IMPORTANT: this requires puppetserver >= 5.0.  Older versions used a
# different config layout.

webserver: {
    static-content: [
        {
            # Resource path: anything served below /packages on port 8140
            path: "/packages"
            # Local filesystem location.  Must be readable by the
            # puppet user (the openvox-gui sync script chmod's it
            # world-readable for that reason).
            resource: "/opt/openvox-pkgs"
        }
    ]
}
