# Apache maintenance mode snippet for OpenVox GUI
#
# Place this (or the relevant parts) inside your <VirtualHost> block.
# This pattern works even when the entire FastAPI + React stack is down.
#
# The install.sh, update_local.sh, update_remote.sh, and deploy.sh scripts
# now automatically raise/lower this flag (and ensure the HTML page exists)
# around all risky operations. Web users will see the branded maintenance page.

RewriteEngine On

# Primary flag location used by the maintenance program (inside the app data dir).
# Scripts touch this file; the backend also reads the companion .json for rich status.
RewriteCond /opt/openvox-gui/data/maintenance.flag -f
RewriteCond %{REQUEST_URI} !/maintenance.html
RewriteCond %{REQUEST_URI} !/favicon.ico
RewriteRule ^ /maintenance.html [R=503,L]

# Serve the static maintenance page from the location the deployment scripts maintain.
# The canonical file is maintained as maintenance.html inside this directory
# (copied from maintenance-formal.html or maintenance-casual.html by the scripts
# or by `ovox maintenance enable --theme ...`).
Alias /maintenance.html /opt/openvox-gui/maintenance/maintenance.html

# === Normal operation (when the flag is absent) ===
# Your existing proxy configuration goes here:
#
# ProxyPreserveHost On
# ProxyPass / http://127.0.0.1:4567/
# ProxyPassReverse / http://127.0.0.1:4567/

# Optional: Also return 503 for any direct hits to the backend port if someone
# bypasses Apache (defense in depth).
# This is not strictly necessary but can be useful.

# To activate:
#   sudo touch /var/www/maintenance/maintenance.flag
#   sudo systemctl reload httpd
#
# To deactivate:
#   sudo rm -f /var/www/maintenance/maintenance.flag
#   sudo systemctl reload httpd
