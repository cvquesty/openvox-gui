# Apache maintenance mode snippet for OpenVox GUI
#
# Place this (or the relevant parts) inside your <VirtualHost> block.
# This pattern works even when the entire FastAPI + React stack is down.

RewriteEngine On

# If the maintenance flag file exists, redirect almost everything to the nice page
# with HTTP 503 (Service Unavailable). This is the correct status for maintenance.
RewriteCond /var/www/maintenance/maintenance.flag -f
RewriteCond %{REQUEST_URI} !/maintenance.html
RewriteCond %{REQUEST_URI} !/favicon.ico
RewriteRule ^ /maintenance.html [R=503,L]

# Serve the static maintenance page from a safe location
Alias /maintenance.html /var/www/maintenance/maintenance.html

# === Normal operation (when the flag is absent) ===
# Your existing proxy configuration goes here:
#
# ProxyPreserveHost On
# ProxyPass / http://127.0.0.1:4567/
# ProxyPassReverse / http://127.0.0.1:4567/

# Optional: Also return 503 for any direct hits to the backend port if someone
# bypasses Apache (defense in depth).
# This is not strictly necessary but can be useful.

# To activate:
#   sudo touch /var/www/maintenance/maintenance.flag
#   sudo systemctl reload httpd
#
# To deactivate:
#   sudo rm -f /var/www/maintenance/maintenance.flag
#   sudo systemctl reload httpd
